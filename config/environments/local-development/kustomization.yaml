apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local development environment overlay
# Uses base application components with development-specific configurations

resources:
  # External CRDs from Milo API
  - github.com/datum-cloud/milo/config/crd/overlays/core-control-plane
  # Base application components
  - ../../base
  # Development-specific certificate issuers
  - issuer-config.yaml

# Optional components (enable/disable as needed)
components:
  # Create a namespace for the system
  - ../../components/namespace
  # Enable TLS for authz webhook
  - webhook-tls

# Enable direct permission tuples for development (opt-in from default legacy model)
patches:
  - target:
      kind: Deployment
      name: controller-manager
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--feature-gates=DirectPermissionTuples=true,LegacyRoleBindingModel=false"
  - target:
      kind: Deployment
      name: authz-webhook
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--feature-gates=DirectPermissionTuples=true,LegacyRoleBindingModel=false"

# Development-specific image configurations
images:
  - name: ghcr.io/datum-cloud/auth-provider-openfga
    newName: auth-provider-openfga
    newTag: dev
