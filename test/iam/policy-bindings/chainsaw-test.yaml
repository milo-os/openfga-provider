apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: policy-bindings
spec:
  steps:
    - try:
        - apply:
            file: roles/iam-user-creator.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: Role
            name: iam.miloapis.com-user-creator
            timeout: 5m
            for:
              condition:
                name: Ready
                value: "true"
        - apply:
            file: roles/compute-workload-admin.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: Role
            name: compute.miloapis.com-workload-admin
            timeout: 5m
            for:
              condition:
                name: Ready
                value: "true"
        - apply:
            file: roles/resourcemanager-organizationowner.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: Role
            name: resourcemanager.miloapis.com-organizationowner
            timeout: 5m
            for:
              condition:
                name: Ready
                value: "true"
        - apply:
            file: roles/resourcemanager-projectowner.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: Role
            name: resourcemanager.miloapis.com-projectowner
            timeout: 5m
            for:
              condition:
                name: Ready
                value: "true"
        - assert:
            resource:
              apiVersion: iam.miloapis.com/v1alpha1
              kind: Role
              metadata:
                name: resourcemanager.miloapis.com-projectowner
              status:
                (length(effectivePermissions)): 10
                effectivePermissions:
                  - compute.miloapis.com/workloads.create
                  - compute.miloapis.com/workloads.delete
                  - compute.miloapis.com/workloads.get
                  - compute.miloapis.com/workloads.list
                  - compute.miloapis.com/workloads.patch
                  - compute.miloapis.com/workloads.update
                  - compute.miloapis.com/workloads.watch
                  - resourcemanager.miloapis.com/projects.delete
                  - resourcemanager.miloapis.com/projects.get
                  - resourcemanager.miloapis.com/projects.update
        - create:
            file: user.yaml
            outputs:
              - name: user
                value: (@)
        - create:
            file: organization.yaml
            outputs:
              - name: org
                value: (@)
        - apply:
            resource:
              apiVersion: iam.miloapis.com/v1alpha1
              kind: PolicyBinding
              metadata:
                name: sample-org-admin-binding
              spec:
                roleRef:
                  name: resourcemanager.miloapis.com-organizationowner
                  namespace: ($namespace)
                subjects:
                  - kind: User
                    name: "kubernetes-admin"
                    uid: ($user.metadata.uid)
                resourceSelector:
                  resourceRef:
                    apiGroup: "resourcemanager.miloapis.com"
                    kind: Organization
                    name: "datum"
                    uid: ($org.metadata.uid)
        - create:
            file: group.yaml
            outputs:
              - name: grp
                value: (@)
        - apply:
            resource:
              apiVersion: iam.miloapis.com/v1alpha1
              kind: PolicyBinding
              metadata:
                name: sample-group-admin-binding
              spec:
                roleRef:
                  name: resourcemanager.miloapis.com-organizationowner
                  namespace: ($namespace)
                subjects:
                  - kind: Group
                    name: "sample-admin-group"
                    uid: ($grp.metadata.uid)
                    namespace: ($namespace)
                resourceSelector:
                  resourceRef:
                    apiGroup: "resourcemanager.miloapis.com"
                    kind: Organization
                    name: "datum"
                    uid: ($org.metadata.uid)

        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: PolicyBinding
            name: sample-org-admin-binding
            timeout: 5m
            for:
              condition:
                name: Ready
                value: 'true'
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: webhook-test
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "kubernetes-admin",
                          "uid": "kubernetes-admin",
                          "extra": {
                            "resourcemanager.miloapis.com/organization-id": ["datum"]
                          },
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "get",
                            "name": "datum"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test completed successfully - access allowed"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test failed - access denied by authorization webhook"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status"
                        exit 1
                      fi
        - wait:
            apiVersion: v1
            kind: Pod
            name: webhook-test
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"

        - apply:
            file: group-user.yaml
            outputs:
              - name: grpUser
                value: (@)
        - apply:
            file: group-memership.yaml

        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: GroupMembership
            name: example-groupmembership
            timeout: 5m
            for:
              condition:
                name: Ready
                value: 'true'

        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: group-user-webhook-test
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "group-user-admin",
                          "uid": "group-user-admin",
                          "extra": {
                            "resourcemanager.miloapis.com/organization-id": ["datum"]
                          },
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "get",
                            "name": "datum"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test completed successfully - access allowed"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test failed - access denied by authorization webhook"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status"
                        exit 1
                      fi
        - wait:
            apiVersion: v1
            kind: Pod
            name: group-user-webhook-test
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"

        # Test that user lost the PolicyBinding of the group after the group membership is deleted.
        - delete: # Delete group membership
            file: group-memership.yaml
        - wait: # Wait for group membership to be deleted
            apiVersion: iam.miloapis.com/v1alpha1
            kind: GroupMembership
            name: example-groupmembership
            timeout: 5m
            for:
              deletion: {}
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: group-user-webhook-test-deletion
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "group-user-admin",
                          "uid": "group-user-admin",
                          "extra": {
                            "resourcemanager.miloapis.com/organization-id": ["datum"]
                          },
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "get",
                            "name": "datum"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test failed - access was allowed"
                        exit 1
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test succeeded - access denied by authorization webhook"
                        exit 0
                      else
                        echo "Webhook test failed - could not determine allowed status"
                        exit 1
                      fi
        - wait:
            apiVersion: v1
            kind: Pod
            name: group-user-webhook-test-deletion
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"

        # Test MachineAccount as a PolicyBinding subject
        - create:
            file: machine-account.yaml
            outputs:
              - name: machineAccount
                value: (@)
        - apply:
            resource:
              apiVersion: iam.miloapis.com/v1alpha1
              kind: PolicyBinding
              metadata:
                name: sample-machine-account-binding
              spec:
                roleRef:
                  name: resourcemanager.miloapis.com-organizationowner
                  namespace: ($namespace)
                subjects:
                  - kind: MachineAccount
                    name: machine-user
                    uid: ($machineAccount.metadata.uid)
                resourceSelector:
                  resourceRef:
                    apiGroup: "resourcemanager.miloapis.com"
                    kind: Organization
                    name: "datum"
                    uid: ($org.metadata.uid)
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: PolicyBinding
            name: sample-machine-account-binding
            timeout: 5m
            for:
              condition:
                name: Ready
                value: 'true'
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: machine-account-webhook-test
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  env:
                  - name: MACHINE_ACCOUNT_UID
                    value: ($machineAccount.metadata.uid)
                  - name: TEST_NAMESPACE
                    value: ($namespace)
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "ma-${TEST_NAMESPACE}@datum.default",
                          "uid": "${MACHINE_ACCOUNT_UID}",
                          "extra": {
                            "resourcemanager.miloapis.com/organization-id": ["datum"]
                          },
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "get",
                            "name": "datum"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test completed successfully - access allowed"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test failed - access denied by authorization webhook"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status"
                        exit 1
                      fi
        - wait:
            apiVersion: v1
            kind: Pod
            name: machine-account-webhook-test
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"
