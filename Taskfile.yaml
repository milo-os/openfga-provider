version: '3'

vars:
  # Image configuration
  IMG: '{{default "auth-provider-openfga:dev" .IMG}}'
  CONTAINER_TOOL: '{{default "docker" .CONTAINER_TOOL}}'

  # Performance test tooling
  K6: '{{default "k6" .K6}}'

  # Cluster configuration (passed to test-infra)
  CLUSTER_NAME: '{{default "auth-provider-openfga" .CLUSTER_NAME}}'
  WAIT_TIMEOUT: '{{default "420s" .WAIT_TIMEOUT}}'

  # Test infrastructure reference
  TEST_INFRA_REPO_REF: 'v0.6.2'

  # Tool directories
  LOCALBIN: '{{.PWD}}/bin'
  GOBIN: '{{default (print (env "GOPATH") "/bin") (env "GOBIN")}}'

  # Tool versions
  KUSTOMIZE_VERSION: 'v5.6.0'
  CONTROLLER_TOOLS_VERSION: 'v0.17.2'
  GOLANGCI_LINT_VERSION:
    sh: test -f .golangci-version && cat .golangci-version || echo "v2.1.6"
  CHAINSAW_VERSION: 'v0.2.13'

  # Kubernetes versions for testing
  ENVTEST_VERSION: "latest"
  ENVTEST_K8S_VERSION: "1.32"

includes:
  test-infra:
    taskfile: https://raw.githubusercontent.com/datum-cloud/test-infra/{{.TEST_INFRA_REPO_REF}}/Taskfile.yml
    checksum: "a1cf6063def6ee21ba42f8a0818127c92a9a5c313c293387f2294e42480dd3d5"
    vars:
      REPO_REF: "{{.TEST_INFRA_REPO_REF}}"
      CLUSTER_NAME: "{{.CLUSTER_NAME}}"
      WAIT_TIMEOUT: "{{.WAIT_TIMEOUT}}"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # Development Tasks
  manifests:
    desc: Generate WebhookConfiguration, ClusterRole and CustomResourceDefinition objects
    deps: [controller-gen]
    cmds:
      - |
        "{{.LOCALBIN}}/controller-gen" rbac:roleName=manager-role crd webhook \
          paths="./..." \
          output:crd:artifacts:config=config/crd/bases \
          output:rbac:artifacts:config=config/base/rbac
    sources:
      - "api/**/*.go"
      - "internal/**/*.go"
    generates:
      - "config/crd/bases/*.yaml"
      - "config/base/rbac/*.yaml"

  generate:
    desc: Generate code containing DeepCopy, DeepCopyInto, and DeepCopyObject method implementations
    deps: [controller-gen]
    cmds:
      - |
        "{{.LOCALBIN}}/controller-gen" object:headerFile="hack/boilerplate.go.txt" paths="./..."
    sources:
      - "api/**/*.go"
    generates:
      - "api/**/*_deepcopy.go"

  fmt:
    desc: Run go fmt against code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet against code
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    deps: [manifests, generate, fmt, vet, setup-envtest]
    cmds:
      - |
        export KUBEBUILDER_ASSETS="$({{.LOCALBIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.LOCALBIN}} -p path)"
        go test $(go list ./... | grep -v /e2e) -coverprofile cover.out

  test:e2e:
    desc: Run end-to-end tests
    deps: [kustomize, manifests, generate, fmt, vet, dev:build, dev:load, chainsaw]
    cmds:
      - |
        set -e
        # Deploy dependencies
        echo "🔧 Deploying application dependencies..."
        {{.LOCALBIN}}/kustomize build config/dependencies | task test-infra:kubectl -- apply --server-side --wait=true -f -
        echo "⏳ Waiting for dependency HelmReleases to be ready..."
        task test-infra:kubectl -- wait --for=condition=Ready helmrelease/openfga -n openfga-system --timeout=240s
        # Deploy application
        echo "🛠️ Deploying application components..."
        {{.LOCALBIN}}/kustomize build config/environments/testing | task test-infra:kubectl -- apply --server-side --wait=true -f -
        # Wait for components
        echo "Waiting for CA certificate to be ready..."
        task test-infra:kubectl -- wait --for=condition=Ready certificate auth-provider-openfga-test-ca -n auth-provider-openfga-system --timeout=300s
        echo "Waiting for Issuers to be ready..."
        task test-infra:kubectl -- wait --for=condition=Ready issuer test-selfsigned-issuer -n auth-provider-openfga-system --timeout=300s
        task test-infra:kubectl -- wait --for=condition=Ready issuer auth-provider-openfga-test-ca-issuer -n auth-provider-openfga-system --timeout=300s
        echo "Waiting for controller manager to be ready..."
        task test-infra:kubectl -- wait --for=condition=Available deployment auth-provider-openfga-controller-manager -n auth-provider-openfga-system --timeout=300s
        echo "Waiting for webhook to be ready..."
        task test-infra:kubectl -- wait --for=condition=Available deployment auth-provider-openfga-authz-webhook -n auth-provider-openfga-system --timeout=300s
        echo "Waiting for OpenFGA to be ready..."
        task test-infra:kubectl -- wait --for=condition=Available deployment openfga -n openfga-system --timeout=300s
        echo "All components are ready. Running chainsaw tests..."
        # Run tests
        {{.LOCALBIN}}/chainsaw test test/ --parallel 10

  lint:
    desc: Run golangci-lint linter
    deps: [golangci-lint]
    cmds:
      - "{{.LOCALBIN}}/golangci-lint run"

  lint:fix:
    desc: Run golangci-lint linter and perform fixes
    deps: [golangci-lint]
    cmds:
      - "{{.LOCALBIN}}/golangci-lint run --fix"

  lint:config:
    desc: Verify golangci-lint linter configuration
    deps: [golangci-lint]
    cmds:
      - "{{.LOCALBIN}}/golangci-lint config verify"

  lint:ci:
    desc: Run linting with CI-like configuration
    deps: [golangci-lint]
    cmds:
      - |
        echo "🔍 Running linter with same config as CI..."
        {{.LOCALBIN}}/golangci-lint run --config=.golangci.yml
        echo "✅ Linting completed successfully - ready for CI!"

  # Build Tasks
  build:
    desc: Build manager binary
    deps: [manifests, generate, fmt, vet]
    cmds:
      - go build -o bin/manager cmd/main.go
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "bin/manager"

  run:
    desc: Run a controller from your host
    deps: [manifests, generate, fmt, vet]
    cmds:
      - go run ./cmd/main.go

  # Development Build/Deploy Tasks (matching Milo pattern)
  dev:build:
    desc: Build the auth-provider-openfga container image for development
    silent: true
    cmds:
      - |
        set -e
        echo "Building auth-provider-openfga container image: {{.IMG}}"
        {{.CONTAINER_TOOL}} build -t "{{.IMG}}" .
    sources:
      - "**/*.go"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"

  dev:load:
    desc: Load the development image into the kind cluster
    deps: [dev:build]
    silent: true
    cmds:
      - |
        set -e
        echo "Loading image {{.IMG}} into kind cluster test-infra"
        kind load docker-image {{.IMG}} --name test-infra

  dev:deploy:
    desc: Deploy auth-provider-openfga to the development environment
    deps: [manifests, generate, dev:load, dev:deploy:dependencies]
    silent: true
    cmds:
      - |
        set -e
        echo "🚀 Deploying application to development environment..."
        {{.LOCALBIN}}/kustomize build config/environments/local-development | kubectl apply --server-side --wait=true -f -
        echo "⏳ Waiting for application deployments to be ready..."
        kubectl wait --for=condition=Available deployment --all -n auth-provider-openfga-system --timeout=180s
        echo "✅ Development environment deployed successfully!"

  dev:deploy:fast:
    desc: Deploy app quickly (skips infrastructure)
    deps: [manifests, generate, dev:load, dev:deploy:dependencies]
    silent: true
    cmds:
      - |
        set -e
        echo "🚀 Fast deployment..."
        {{.LOCALBIN}}/kustomize build config/environments/local-development | kubectl apply --server-side --wait=true -f -
        echo "⏳ Waiting for application deployments to be ready..."
        kubectl wait --for=condition=Available deployment --all -n auth-provider-openfga-system --timeout=180s
        echo "✅ Fast development deployment complete!"

  dev:deploy:dependencies:
    desc: Deploy application-specific dependencies (OpenFGA)
    deps: [kustomize]
    silent: true
    cmds:
      - |
        set -e
        echo "📦 Deploying application dependencies (OpenFGA, etc.)..."
        {{.LOCALBIN}}/kustomize build config/dependencies | kubectl apply --server-side --wait=true -f -
        echo "⏳ Waiting for dependencies to be ready..."
        kubectl wait --for=condition=Ready helmrelease/openfga -n openfga-system --timeout=240s
        echo "✅ Application dependencies deployed successfully!"

  dev:undeploy:
    desc: Remove development environment deployments
    deps: [kustomize]
    silent: true
    cmds:
      - |
        echo "🗑️ Removing development environment..."
        {{.LOCALBIN}}/kustomize build config/environments/local-development | kubectl delete --ignore-not-found=true -f -

  dev:reset:
    desc: Reset development environment
    cmds:
      - task: dev:undeploy
      - task: dev:deploy

  dev:logs:
    desc: Show logs from controller manager
    cmds:
      - |
        echo "=== Controller Manager Logs ==="
        kubectl logs -l control-plane=controller-manager -n auth-provider-openfga-system --tail=50 -f

  dev:logs:webhook:
    desc: Show logs from authz webhook
    cmds:
      - |
        echo "=== AuthZ Webhook Logs ==="
        kubectl logs -l app.kubernetes.io/name=openfga-authz-webhook -n auth-provider-openfga-system --tail=50 -f

  dev:status:
    desc: Show development environment status
    cmds:
      - |
        echo "=== Cluster Info ==="
        kubectl cluster-info
        echo ""
        echo "=== Auth Provider OpenFGA Pods ==="
        kubectl get pods -n auth-provider-openfga-system
        echo ""
        echo "=== OpenFGA Pods ==="
        kubectl get pods -n openfga-system
        echo ""
        echo "=== Services ==="
        kubectl get services -n auth-provider-openfga-system
        kubectl get services -n openfga-system

  dev:forward:metrics:
    desc: Forward metrics port for local access
    cmds:
      - |
        echo "Forwarding metrics port 8080..."
        echo "Access metrics at http://localhost:8080/metrics"
        kubectl port-forward -n auth-provider-openfga-system svc/auth-provider-openfga-controller-manager-metrics 8080:8080

  dev:forward:openfga:
    desc: Forward OpenFGA port for local access
    cmds:
      - |
        echo "Forwarding OpenFGA port 8080..."
        echo "Access OpenFGA at http://localhost:8081"
        kubectl port-forward -n openfga-system svc/openfga 8081:8080

  dev:setup:
    desc: Setup complete development environment
    cmds:
      - |
        echo "🚀 Setting up Auth Provider OpenFGA development environment..."
        echo "📦 Installing/checking development tools..."
      - task: localbin-dir
      - task: test-infra:cluster-up
      - task: dev:deploy
      - |
        echo ""
        echo "🎉 Development environment setup complete!"
        echo "📖 Quick commands:"
        echo "  task dev:status          # Check environment status"
        echo "  task dev:logs            # View application logs"
        echo "  task dev:forward:metrics # Access metrics at localhost:8080"
        echo "  task --list              # View all available commands"

  # Docker/Container Tasks
  docker:build:
    desc: Build docker image with the manager
    cmds:
      - "{{.CONTAINER_TOOL}} build -t {{.IMG}} ."
    sources:
      - "**/*.go"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"

  docker:push:
    desc: Push docker image with the manager
    cmds:
      - "{{.CONTAINER_TOOL}} push {{.IMG}}"

  docker:buildx:
    desc: Build and push docker image for cross-platform support
    vars:
      PLATFORMS: '{{default "linux/arm64,linux/amd64,linux/s390x,linux/ppc64le" .PLATFORMS}}'
    cmds:
      - |
        sed -e '1 s/\(^FROM\)/FROM --platform=\$${BUILDPLATFORM}/; t' -e ' 1,// s//FROM --platform=\$${BUILDPLATFORM}/' Dockerfile > Dockerfile.cross
        {{.CONTAINER_TOOL}} buildx create --name auth-provider-openfga-builder || true
        {{.CONTAINER_TOOL}} buildx use auth-provider-openfga-builder
        {{.CONTAINER_TOOL}} buildx build --push --platform={{.PLATFORMS}} --tag {{.IMG}} -f Dockerfile.cross .
        {{.CONTAINER_TOOL}} buildx rm auth-provider-openfga-builder || true
        rm Dockerfile.cross

  build:installer:
    desc: Generate a consolidated YAML with CRDs and deployment
    deps: [manifests, generate, kustomize]
    cmds:
      - mkdir -p dist
      - cd config/manager && {{.LOCALBIN}}/kustomize edit set image controller={{.IMG}}
      - "{{.LOCALBIN}}/kustomize build config/default > dist/install.yaml"

  # Deployment Tasks
  install:
    desc: Install CRDs into the K8s cluster
    deps: [manifests, kustomize]
    cmds:
      - "{{.LOCALBIN}}/kustomize build config/crd | kubectl apply -f -"

  uninstall:
    desc: Uninstall CRDs from the K8s cluster
    deps: [manifests, kustomize]
    vars:
      IGNORE_NOT_FOUND: '{{default "false" .IGNORE_NOT_FOUND}}'
    cmds:
      - "{{.LOCALBIN}}/kustomize build config/crd | kubectl delete --ignore-not-found={{.IGNORE_NOT_FOUND}} -f -"

  deploy:
    desc: Deploy controller to the K8s cluster
    deps: [manifests, kustomize]
    cmds:
      - cd config/manager && {{.LOCALBIN}}/kustomize edit set image controller={{.IMG}}
      - "{{.LOCALBIN}}/kustomize build config/default | kubectl apply -f -"

  undeploy:
    desc: Undeploy controller from the K8s cluster
    deps: [kustomize]
    vars:
      IGNORE_NOT_FOUND: '{{default "false" .IGNORE_NOT_FOUND}}'
    cmds:
      - "{{.LOCALBIN}}/kustomize build config/default | kubectl delete --ignore-not-found={{.IGNORE_NOT_FOUND}} -f -"

  # Performance Test Tasks

  test:perf:forward:
    desc: Start background port-forwards for the authz webhook and Victoria Metrics
    cmds:
      - |
        mkdir -p .tmp
        if [ -f .tmp/perf-forward.pid ] && kill -0 "$(cat .tmp/perf-forward.pid)" 2>/dev/null; then
          echo "Port-forward already running (PID $(cat .tmp/perf-forward.pid))"
          exit 0
        fi
        # Use kubectl directly (not via task wrapper) so we get the real process PID
        # for reliable lifecycle management (kill on cleanup).
        kubectl --kubeconfig .test-infra/kubeconfig port-forward -n auth-provider-openfga-system \
          svc/auth-provider-openfga-authz-webhook 8090:8090 &
        echo $! > .tmp/perf-forward.pid
        sleep 2

        # Always start Victoria Metrics port-forward so annotations are durable
        # (perf_annotation metrics survive Grafana rebuilds by living in VM).
        if [ -f .tmp/perf-vm-forward.pid ] && kill -0 "$(cat .tmp/perf-vm-forward.pid)" 2>/dev/null; then
          echo "Victoria Metrics port-forward already running (PID $(cat .tmp/perf-vm-forward.pid))"
        else
          echo "Starting Victoria Metrics port-forward (port 8428)..."
          kubectl --kubeconfig .test-infra/kubeconfig port-forward -n telemetry-system \
            svc/vmsingle-telemetry-system-vm-stack-victoria-metrics-k8s-stack 8428:8428 &
          echo $! > .tmp/perf-vm-forward.pid
          sleep 2
        fi

  test:perf:forward:stop:
    desc: Stop background port-forwards started by test:perf:forward
    cmds:
      - |
        if [ -f .tmp/perf-forward.pid ]; then
          kill "$(cat .tmp/perf-forward.pid)" 2>/dev/null || true
          rm -f .tmp/perf-forward.pid
        fi
        if [ -f .tmp/perf-vm-forward.pid ]; then
          kill "$(cat .tmp/perf-vm-forward.pid)" 2>/dev/null || true
          rm -f .tmp/perf-vm-forward.pid
        fi

  test:perf:setup:
    desc: Deploy PostgreSQL + OpenFGA postgres overlay + app + fixtures (idempotent)
    deps: [kustomize]
    cmds:
      - |
        set -e
        echo "Applying perf Kustomize overlay (PostgreSQL + OpenFGA postgres patch + app)..."
        {{.LOCALBIN}}/kustomize build config/environments/perf | task test-infra:kubectl -- apply --server-side -f -

        echo "Waiting for PostgreSQL HelmRelease to be Ready..."
        task test-infra:kubectl -- wait --for=condition=Ready helmrelease/openfga-database \
          -n openfga-system --timeout=300s

        echo "Waiting for OpenFGA HelmRelease to be Ready..."
        task test-infra:kubectl -- wait --for=condition=Ready helmrelease/openfga \
          -n openfga-system --timeout=240s

        echo "Waiting for OpenFGA deployment to be Available..."
        task test-infra:kubectl -- wait --for=condition=Available deployment/openfga \
          -n openfga-system --timeout=120s

        echo "Running store-init job..."
        {{.LOCALBIN}}/kustomize build config/environments/perf/store-init | task test-infra:kubectl -- apply --server-side -f -
        task test-infra:kubectl -- wait --for=condition=Complete job/openfga-store-init \
          -n openfga-system --timeout=120s

        echo "Re-applying perf overlay to pick up store-id ConfigMap in app Deployments..."
        {{.LOCALBIN}}/kustomize build config/environments/perf | task test-infra:kubectl -- apply --server-side -f -

        echo "Waiting for controller-manager to be Available..."
        task test-infra:kubectl -- wait --for=condition=Available \
          deployment/auth-provider-openfga-controller-manager \
          -n auth-provider-openfga-system --timeout=300s

        echo "Waiting for authz webhook to be Available..."
        task test-infra:kubectl -- wait --for=condition=Available \
          deployment/auth-provider-openfga-authz-webhook \
          -n auth-provider-openfga-system --timeout=300s

        echo "Running fixture setup script..."
        KUBECTL="task test-infra:kubectl --" \
          bash test/perf/setup-fixtures.sh > /dev/null

        echo "Perf setup complete."

  test:perf:teardown:
    desc: Revert OpenFGA to in-memory storage and remove PostgreSQL deployment
    deps: [kustomize]
    cmds:
      - |
        set -e
        echo "Re-applying in-memory OpenFGA configuration..."
        {{.LOCALBIN}}/kustomize build config/dependencies | task test-infra:kubectl -- apply --server-side -f -

        echo "Deleting PostgreSQL HelmRelease and OCIRepository..."
        task test-infra:kubectl -- delete helmrelease openfga-database \
          -n openfga-system --ignore-not-found
        task test-infra:kubectl -- delete ocirepository postgresql \
          -n openfga-system --ignore-not-found

        echo "Deleting store-init job and configmap..."
        task test-infra:kubectl -- delete job openfga-store-init \
          -n openfga-system --ignore-not-found
        task test-infra:kubectl -- delete configmap openfga-store-id \
          -n openfga-system --ignore-not-found

        echo "Waiting for OpenFGA HelmRelease to be Ready after revert..."
        task test-infra:kubectl -- wait --for=condition=Ready helmrelease/openfga \
          -n openfga-system --timeout=240s

        echo "Waiting for OpenFGA deployment to be Available after revert..."
        task test-infra:kubectl -- wait --for=condition=Available deployment/openfga \
          -n openfga-system --timeout=120s

        echo "Teardown complete."

  test:perf:annotate:
    desc: "Write a perf annotation to Victoria Metrics (usage: task test:perf:annotate -- tweak description)"
    cmds:
      - VM_URL=http://localhost:8428 bash test/perf/annotate.sh {{.CLI_ARGS}}

  test:perf:clean:
    desc: Remove k6 result files and port-forward PID files
    cmds:
      - |
        rm -f test/perf/results/*.json
        rm -f .tmp/perf-forward.pid
        rm -f .tmp/perf-vm-forward.pid
        echo "Cleaned perf results and PID files."

  test:perf:openfga:forward:
    desc: Port-forward OpenFGA gRPC port (8081) to localhost for the fixture generator
    cmds:
      - |
        mkdir -p .tmp
        if [ -f .tmp/perf-openfga-forward.pid ] && kill -0 "$(cat .tmp/perf-openfga-forward.pid)" 2>/dev/null; then
          echo "OpenFGA port-forward already running (PID $(cat .tmp/perf-openfga-forward.pid))"
          exit 0
        fi
        kubectl --kubeconfig .test-infra/kubeconfig port-forward -n openfga-system \
          svc/openfga 8081:8080 &
        echo $! > .tmp/perf-openfga-forward.pid
        sleep 2

  test:perf:openfga:forward:stop:
    desc: Stop the OpenFGA gRPC port-forward started by test:perf:openfga:forward
    cmds:
      - |
        if [ -f .tmp/perf-openfga-forward.pid ]; then
          kill "$(cat .tmp/perf-openfga-forward.pid)" 2>/dev/null || true
          rm -f .tmp/perf-openfga-forward.pid
        fi

  test:perf:generate:
    desc: Generate scale test fixtures by writing tuples directly to OpenFGA
    vars:
      # Scale presets — set PERF_SCALE=small|medium|large|xlarge to override all
      # scale parameters at once. Individual env vars take precedence over the preset.
      _PERF_SCALE: '{{default "small" .PERF_SCALE}}'
    cmds:
      - |
        set -e

        # Verify go is available
        if ! command -v go >/dev/null 2>&1; then
          echo "ERROR: go not found. Install Go: https://go.dev/doc/install"
          exit 1
        fi

        # Apply scale presets. Individual PERF_* env vars (already exported) take precedence.
        SCALE="{{._PERF_SCALE}}"
        case "${SCALE}" in
          small)
            export PERF_NUM_ORGS="${PERF_NUM_ORGS:-100}"
            export PERF_NUM_PROJECTS_PER_ORG="${PERF_NUM_PROJECTS_PER_ORG:-10}"
            export PERF_NUM_USERS="${PERF_NUM_USERS:-100}"
            export PERF_NUM_ROLES="${PERF_NUM_ROLES:-5}"
            export PERF_PERMISSIONS_PER_ROLE="${PERF_PERMISSIONS_PER_ROLE:-10}"
            export PERF_MEMBERSHIPS_PER_USER="${PERF_MEMBERSHIPS_PER_USER:-100}"
            ;;
          medium)
            export PERF_NUM_ORGS="${PERF_NUM_ORGS:-1000}"
            export PERF_NUM_PROJECTS_PER_ORG="${PERF_NUM_PROJECTS_PER_ORG:-10}"
            export PERF_NUM_USERS="${PERF_NUM_USERS:-1000}"
            export PERF_NUM_ROLES="${PERF_NUM_ROLES:-5}"
            export PERF_PERMISSIONS_PER_ROLE="${PERF_PERMISSIONS_PER_ROLE:-10}"
            export PERF_MEMBERSHIPS_PER_USER="${PERF_MEMBERSHIPS_PER_USER:-10}"
            ;;
          large)
            export PERF_NUM_ORGS="${PERF_NUM_ORGS:-10000}"
            export PERF_NUM_PROJECTS_PER_ORG="${PERF_NUM_PROJECTS_PER_ORG:-5}"
            export PERF_NUM_USERS="${PERF_NUM_USERS:-5000}"
            export PERF_NUM_ROLES="${PERF_NUM_ROLES:-5}"
            export PERF_PERMISSIONS_PER_ROLE="${PERF_PERMISSIONS_PER_ROLE:-10}"
            export PERF_MEMBERSHIPS_PER_USER="${PERF_MEMBERSHIPS_PER_USER:-10}"
            ;;
          xlarge)
            if [ "${PERF_CONFIRM_LARGE:-false}" != "true" ]; then
              echo "ERROR: PERF_SCALE=xlarge requires PERF_CONFIRM_LARGE=true."
              echo "This scale will write ~3 million tuples and may saturate the Kind cluster's PostgreSQL."
              echo "Set PERF_CONFIRM_LARGE=true to proceed."
              exit 1
            fi
            export PERF_NUM_ORGS="${PERF_NUM_ORGS:-100000}"
            export PERF_NUM_PROJECTS_PER_ORG="${PERF_NUM_PROJECTS_PER_ORG:-5}"
            export PERF_NUM_USERS="${PERF_NUM_USERS:-10000}"
            export PERF_NUM_ROLES="${PERF_NUM_ROLES:-5}"
            export PERF_PERMISSIONS_PER_ROLE="${PERF_PERMISSIONS_PER_ROLE:-10}"
            export PERF_MEMBERSHIPS_PER_USER="${PERF_MEMBERSHIPS_PER_USER:-10}"
            ;;
          *)
            echo "WARNING: unknown PERF_SCALE value '${SCALE}', using environment variables as-is"
            ;;
        esac

        # Get the OpenFGA store ID from the cluster.
        STORE_ID=$(task test-infra:kubectl -- get configmap openfga-store-id \
          -n openfga-system -o jsonpath='{.data.store-id}' 2>/dev/null || true)
        if [ -z "${STORE_ID}" ]; then
          echo "ERROR: Could not retrieve OpenFGA store ID from configmap openfga-store-id in openfga-system."
          echo "Run 'task test:perf:setup' first to initialize the store."
          exit 1
        fi
        echo "Using OpenFGA store ID: ${STORE_ID}"

        # Start OpenFGA port-forward.
        task test:perf:openfga:forward
        trap "task test:perf:openfga:forward:stop" EXIT

        # Run the fixture generator.
        OPENFGA_STORE_ID="${STORE_ID}" \
        OPENFGA_API_URL="${OPENFGA_API_URL:-localhost:8081}" \
        KUBECTL="kubectl --kubeconfig .test-infra/kubeconfig" \
          go run ./test/perf/cmd/generate-fixtures/

        echo "Scale fixture generation complete."

  test:perf:scale:
    desc: Run the multi-scenario k6 scale test using the generated fixture manifest
    vars:
      _PERF_SCALE: '{{default "small" .PERF_SCALE}}'
    cmds:
      - |
        set -e

        # Verify k6 is available before proceeding.
        if ! command -v {{.K6}} >/dev/null 2>&1; then
          echo "ERROR: k6 not found (looked for '{{.K6}}')."
          echo "Install k6: https://grafana.com/docs/k6/latest/set-up/install-k6/"
          exit 1
        fi

        MANIFEST_PATH="${PERF_FIXTURE_MANIFEST:-test/perf/fixtures/scale-manifest.json}"

        if [ ! -f "${MANIFEST_PATH}" ]; then
          echo "ERROR: fixture manifest not found at ${MANIFEST_PATH}."
          echo "Run 'task test:perf:generate' first."
          exit 1
        fi

        # Start webhook port-forward.
        task test:perf:forward
        trap "task test:perf:forward:stop" EXIT

        mkdir -p test/perf/results
        RESULT_FILE="test/perf/results/scale-result-$(date +%Y%m%d-%H%M%S).json"

        K6_OUTPUTS="--out json=${RESULT_FILE}"
        if [ "${PERF_METRICS:-false}" = "true" ]; then
          K6_OUTPUTS="${K6_OUTPUTS} --out experimental-opentelemetry"
        fi

        PERF_VUS_VAL="${PERF_VUS:-20}"
        PERF_DURATION_VAL="${PERF_DURATION:-60s}"
        PERF_RAMP_UP_VAL="${PERF_RAMP_UP:-10s}"

        VM_URL=http://localhost:8428 bash test/perf/annotate.sh scale-perf-test \
          "Scale perf test ({{._PERF_SCALE}}): ${PERF_VUS_VAL} VUs, ${PERF_DURATION_VAL} sustained" \
          2>&1 || true

        K6_OTEL_EXPORTER_OTLP_ENDPOINT="${K6_OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:8428}" \
        K6_OTEL_EXPORTER_OTLP_PROTOCOL="${K6_OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}" \
        K6_OTEL_METRIC_PREFIX="${K6_OTEL_METRIC_PREFIX:-k6_}" \
        {{.K6}} run \
          ${K6_OUTPUTS} \
          -e PERF_FIXTURE_MANIFEST="${MANIFEST_PATH}" \
          -e WEBHOOK_URL="${WEBHOOK_URL:-https://localhost:8090/apis/authorization.k8s.io/v1/subjectaccessreviews}" \
          -e AUTH_TOKEN="${AUTH_TOKEN:-}" \
          -e TLS_SKIP_VERIFY="${TLS_SKIP_VERIFY:-true}" \
          -e PERF_VUS="${PERF_VUS_VAL}" \
          -e PERF_DURATION="${PERF_DURATION_VAL}" \
          -e PERF_RAMP_UP="${PERF_RAMP_UP_VAL}" \
          -e PERF_SCENARIOS="${PERF_SCENARIOS:-random,hotspot,denied,project}" \
          -e ENVIRONMENT="${ENVIRONMENT:-kind-local}" \
          test/perf/sar-scale-test.js

        echo ""
        echo "Scale test results written to: ${RESULT_FILE}"

  test:perf:
    desc: Run the full SubjectAccessReview performance test against the local Kind cluster
    deps: [kustomize]
    cmds:
      - |
        set -e

        # Verify k6 is available before proceeding
        if ! command -v {{.K6}} >/dev/null 2>&1; then
          echo "ERROR: k6 not found (looked for '{{.K6}}')."
          echo "Install k6: https://grafana.com/docs/k6/latest/set-up/install-k6/"
          exit 1
        fi

        task test:perf:setup

        task test:perf:forward

        # Ensure the port-forward is stopped on exit (success or failure)
        trap "task test:perf:forward:stop" EXIT

        # The SAR spec.uid field must match the OpenFGA tuple key, which is the
        # user resource NAME (not the Kubernetes metadata.uid). The policy
        # reconciler writes tuples keyed by subject.Name ("perf-test-user").
        PERF_USER_UID="perf-test-user"
        echo "Using user name as PERF_USER_UID: ${PERF_USER_UID}"

        mkdir -p test/perf/results
        RESULT_FILE="test/perf/results/result-$(date +%Y%m%d-%H%M%S).json"

        # Build k6 output flags
        K6_OUTPUTS="--out json=${RESULT_FILE}"
        if [ "${PERF_METRICS:-false}" = "true" ]; then
          K6_OUTPUTS="${K6_OUTPUTS} --out experimental-opentelemetry"
          echo "Metrics will be forwarded via OpenTelemetry to ${K6_OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:8428}"
        fi

        # Annotate the start of the perf test run in Victoria Metrics
        PERF_VUS_VAL="${PERF_VUS:-10}"
        PERF_DURATION_VAL="${PERF_DURATION:-30s}"
        VM_URL=http://localhost:8428 bash test/perf/annotate.sh perf-test "Perf test: ${PERF_VUS_VAL} VUs, ${PERF_DURATION_VAL} sustained" 2>&1 || true

        K6_OTEL_EXPORTER_OTLP_ENDPOINT="${K6_OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:8428}" \
        K6_OTEL_EXPORTER_OTLP_PROTOCOL="${K6_OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}" \
        K6_OTEL_METRIC_PREFIX="${K6_OTEL_METRIC_PREFIX:-k6_}" \
        {{.K6}} run \
          ${K6_OUTPUTS} \
          -e WEBHOOK_URL="${WEBHOOK_URL:-https://localhost:8090/apis/authorization.k8s.io/v1/subjectaccessreviews}" \
          -e AUTH_TOKEN="${AUTH_TOKEN:-}" \
          -e TLS_SKIP_VERIFY="${TLS_SKIP_VERIFY:-true}" \
          -e PERF_VUS="${PERF_VUS_VAL}" \
          -e PERF_DURATION="${PERF_DURATION_VAL}" \
          -e PERF_RAMP_UP="${PERF_RAMP_UP:-5s}" \
          -e PERF_USER_UID="${PERF_USER_UID}" \
          -e PERF_ORG_NAME="${PERF_ORG_NAME:-perf-test-org}" \
          -e ENVIRONMENT="${ENVIRONMENT:-kind-local}" \
          test/perf/sar-load-test.js

        echo ""
        echo "Results written to: ${RESULT_FILE}"

  # Tool Installation Tasks
  localbin-dir:
    desc: Create local bin directory
    cmds:
      - mkdir -p "{{.LOCALBIN}}"
    status:
      - test -d "{{.LOCALBIN}}"

  kustomize:
    desc: Download kustomize locally if necessary
    deps: [localbin-dir]
    cmds:
      - task: install-go-tool
        vars:
          TOOL: kustomize
          PACKAGE: sigs.k8s.io/kustomize/kustomize/v5
          VERSION: "{{.KUSTOMIZE_VERSION}}"
    status:
      - test -f "{{.LOCALBIN}}/kustomize"

  controller-gen:
    desc: Download controller-gen locally if necessary
    deps: [localbin-dir]
    cmds:
      - task: install-go-tool
        vars:
          TOOL: controller-gen
          PACKAGE: sigs.k8s.io/controller-tools/cmd/controller-gen
          VERSION: "{{.CONTROLLER_TOOLS_VERSION}}"
    status:
      - test -f "{{.LOCALBIN}}/controller-gen"

  setup-envtest:
    desc: Download the binaries required for ENVTEST
    deps: [envtest]
    cmds:
      - |
        echo "Setting up envtest binaries for Kubernetes version {{.ENVTEST_K8S_VERSION}}..."
        {{.LOCALBIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.LOCALBIN}} -p path || {
          echo "Error: Failed to set up envtest binaries for version {{.ENVTEST_K8S_VERSION}}."
          exit 1
        }

  envtest:
    desc: Download setup-envtest locally if necessary
    deps: [localbin-dir]
    cmds:
      - task: install-go-tool
        vars:
          TOOL: setup-envtest
          PACKAGE: sigs.k8s.io/controller-runtime/tools/setup-envtest
          VERSION: "{{.ENVTEST_VERSION}}"
    status:
      - test -f "{{.LOCALBIN}}/setup-envtest"

  golangci-lint:
    desc: Download golangci-lint locally if necessary
    deps: [localbin-dir]
    cmds:
      - task: install-go-tool
        vars:
          TOOL: golangci-lint
          PACKAGE: github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          VERSION: "{{.GOLANGCI_LINT_VERSION}}"
    status:
      - test -f "{{.LOCALBIN}}/golangci-lint"

  chainsaw:
    desc: Download chainsaw locally if necessary
    deps: [localbin-dir]
    cmds:
      - task: install-go-tool
        vars:
          TOOL: chainsaw
          PACKAGE: github.com/kyverno/chainsaw
          VERSION: "{{.CHAINSAW_VERSION}}"
    status:
      - test -f "{{.LOCALBIN}}/chainsaw"

  install-go-tool:
    desc: Install a Go tool if not already installed
    internal: true
    vars:
      TOOL_PATH: "{{.LOCALBIN}}/{{.TOOL}}"
    cmds:
      - |
        package="{{.PACKAGE}}@{{.VERSION}}"
        echo "Installing ${package}"
        GOBIN="{{.LOCALBIN}}" go install ${package}
    status:
      - test -f "{{.TOOL_PATH}}"

  # Validation Tasks
  validate:local-dev:
    desc: Validate local development configuration
    deps: [kustomize]
    cmds:
      - |
        echo "🔍 Validating local development configuration..."
        {{.LOCALBIN}}/kustomize build config/environments/local-development > /dev/null && echo "✅ Local development config builds successfully"
        echo "Checking for deployment resources:"
        {{.LOCALBIN}}/kustomize build config/environments/local-development | grep -A 1 "kind: Deployment" | grep "name:" || echo "No deployments found"
        echo "✅ Local development configuration validated"

  validate:configs:
    desc: Validate all configurations
    deps: [validate:local-dev]
    cmds:
      - |
        echo "🔍 Validating core configurations..."
        echo "Dependencies configuration:"
        {{.LOCALBIN}}/kustomize build config/dependencies > /dev/null && echo "✅ Dependencies config builds successfully"
        echo "Base configuration:"
        {{.LOCALBIN}}/kustomize build config/base > /dev/null && echo "✅ Base config builds successfully"
        echo "Testing configuration:"
        {{.LOCALBIN}}/kustomize build config/environments/testing > /dev/null && echo "✅ Testing config builds successfully"
        echo "✅ All configurations validated"

  validate-kustomizations:
    desc: Validate all kustomization.yaml files using kustomize build
    cmds:
      - echo "# Kustomize Validation Results"
      - echo ""
      - |
        HAS_ERRORS=0
        KUSTOMIZATION_DIRS=$(find . -name "kustomization.yaml" -exec dirname {} \;)
        for dir in $KUSTOMIZATION_DIRS; do
          echo "🔍 Validating: $dir"
          if ! OUTPUT=$(kustomize build "$dir" 2>&1); then
            echo ""
            echo "❌ Error in '$dir':"
            echo "----------------------------------------"
            echo "$OUTPUT"
            echo "----------------------------------------"
            echo ""
            HAS_ERRORS=1
          else
            echo "✅ $dir is valid"
          fi
        done
        if [ "$HAS_ERRORS" -eq 1 ]; then
          echo ""
          echo "🚨 One or more kustomizations failed validation."
          exit 1
        else
          echo ""
          echo "🎉 All kustomizations are valid."
        fi
    silent: false
