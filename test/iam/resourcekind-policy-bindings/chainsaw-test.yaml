apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: resourcekind-policy-bindings
spec:
  steps:
    - try:
        # Create a role for organization management
        - apply:
            file: roles/resourcekind-organizationowner.yaml
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: Role
            name: resourcekind.miloapis.com-organizationowner
            timeout: 5m
            for:
              condition:
                name: Ready
                value: "true"

        # Create test user
        - apply:
            file: user.yaml

        # Create multiple organizations to test system-wide access
        - apply:
            file: organization1.yaml
        - apply:
            file: organization2.yaml

        # Fetch the test user UID — apply returns the local resource spec (without
        # server-generated fields like UID), so we fetch it explicitly via script.
        - script:
            content: |
              kubectl get users.iam.miloapis.com test-system-admin \
                -o jsonpath='{.metadata.uid}'
            outputs:
              - name: userUID
                value: ($stdout)

        # Create ResourceKind PolicyBinding that grants access to ALL organizations.
        # The uid field is the K8s metadata UID (required for controller validation),
        # but the OpenFGA tuple uses the subject name ("test-system-admin") as the
        # user identifier, not the uid field.
        #
        # ResourceKind PolicyBindings write tuples targeting the root object
        # (iam.miloapis.com/Root:<apiGroup>/<Kind>). The webhook resolves collection
        # operations (list, create, watch) to this root object, enabling system-wide
        # access for those verbs.
        - apply:
            resource:
              apiVersion: iam.miloapis.com/v1alpha1
              kind: PolicyBinding
              metadata:
                name: system-wide-org-admin-binding
              spec:
                roleRef:
                  name: resourcekind.miloapis.com-organizationowner
                  namespace: ($namespace)
                subjects:
                  - kind: User
                    name: "test-system-admin"
                    uid: ($userUID)
                resourceSelector:
                  resourceKind:
                    apiGroup: "resourcemanager.miloapis.com"
                    kind: Organization

        # Wait for PolicyBinding to be ready
        - wait:
            apiVersion: iam.miloapis.com/v1alpha1
            kind: PolicyBinding
            name: system-wide-org-admin-binding
            timeout: 5m
            for:
              condition:
                name: Ready
                value: 'true'

        # Test collection list access. ResourceKind bindings target the root object
        # (iam.miloapis.com/Root:resourcemanager.miloapis.com/Organization) which
        # collection operations (list, create, watch) resolve to. The uid field
        # uses the user's resource name, which is the OpenFGA user identifier.
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: resourcekind-webhook-test-list
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "test-system-admin",
                          "uid": "test-system-admin",
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "list"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response for list: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test completed successfully - list allowed"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test failed - list denied by authorization webhook"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status for list"
                        exit 1
                      fi

        # Wait for list test to complete
        - wait:
            apiVersion: v1
            kind: Pod
            name: resourcekind-webhook-test-list
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"

        # Test collection create access (another collection operation that should be allowed)
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: resourcekind-webhook-test-create
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "test-system-admin",
                          "uid": "test-system-admin",
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "create"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response for create: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was allowed
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test completed successfully - create allowed"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test failed - create denied by authorization webhook"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status for create"
                        exit 1
                      fi

        # Wait for create test to complete
        - wait:
            apiVersion: v1
            kind: Pod
            name: resourcekind-webhook-test-create
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"

        # Test that a user WITHOUT the ResourceKind binding cannot access organizations
        - apply:
            file: unauthorized-user.yaml

        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: resourcekind-webhook-test-unauthorized
              spec:
                restartPolicy: Never
                containers:
                - name: curl
                  image: curlimages/curl:latest
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      response=$(curl -ksS https://auth-provider-openfga-authz-webhook.auth-provider-openfga-system.svc.cluster.local:8090/apis/authorization.k8s.io/v1/subjectaccessreviews \
                        -H "Content-Type: application/json" \
                        -d @- << EOF
                      {
                        "apiVersion": "authorization.k8s.io/v1",
                        "kind": "SubjectAccessReview",
                        "spec": {
                          "user": "unauthorized-user",
                          "uid": "unauthorized-user",
                          "groups": ["system:authenticated"],
                          "resourceAttributes": {
                            "group": "resourcemanager.miloapis.com",
                            "resource": "organizations",
                            "version": "v1alpha1",
                            "verb": "list"
                          }
                        }
                      }
                      EOF
                      )
                      echo "Webhook response for unauthorized user: $response"
                      # Check if we got a valid SubjectAccessReview response
                      if ! echo "$response" | grep -q '"kind":"SubjectAccessReview"'; then
                        echo "Webhook test failed - invalid response format"
                        exit 1
                      fi
                      # Check if the request was denied (which is expected)
                      if echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*false'; then
                        echo "Webhook test completed successfully - access denied to unauthorized user as expected"
                        exit 0
                      elif echo "$response" | grep -q '"allowed"[[:space:]]*:[[:space:]]*true'; then
                        echo "Webhook test failed - access was unexpectedly allowed for unauthorized user"
                        exit 1
                      else
                        echo "Webhook test failed - could not determine allowed status for unauthorized user"
                        exit 1
                      fi

        # Wait for unauthorized test to complete
        - wait:
            apiVersion: v1
            kind: Pod
            name: resourcekind-webhook-test-unauthorized
            timeout: 30s
            for:
              jsonPath:
                path: "status.phase"
                value: "Succeeded"
